version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: lb2tc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lb2tc_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lb2tencentcloud}
      MYSQL_USER: ${MYSQL_USER:-lb2tc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lb2tc_pass_2026}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=100
      - --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lb2tc-net

  app:
    build: .
    container_name: lb2tc-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PORT:-10041}:10041"
    environment:
      DEV_MODE: "0"
      PORT: "10041"
      WORKERS: "4"
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-lb2tc}:${MYSQL_PASSWORD:-lb2tc_pass_2026}@mysql:3306/${MYSQL_DATABASE:-lb2tencentcloud}?charset=utf8mb4
    volumes:
      - app_logs:/app/logs
    networks:
      - lb2tc-net

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local

networks:
  lb2tc-net:
    driver: bridge
